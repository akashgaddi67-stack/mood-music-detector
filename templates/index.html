<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mood Music Detector 🎵</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');
    body {
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(to right, #1f1c2c, #928dab);
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      transition: background 1s ease;
    }
    header {
      padding: 20px;
      text-align: center;
      font-size: 2rem;
      font-weight: 700;
      color: #ff4081;
    }
    #video-container {
      width: 320px;
      height: 240px;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 0 15px #ff4081aa;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    canvas {
      display: none;
      margin-top: 15px;
      border-radius: 12px;
      box-shadow: 0 0 10px #ff4081cc;
    }
    .buttons {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }
    button {
      background: #ff4081;
      border: none;
      padding: 12px 20px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 30px;
      color: #fff;
      cursor: pointer;
    }
    #mood-result {
      margin-top: 20px;
      font-size: 1.5rem;
      color: #ff80ab;
      text-align: center;
    }
    #song-player {
      margin-top: 15px;
      width: 320px;
      height: 180px;
      border-radius: 12px;
      box-shadow: 0 0 15px #ff4081cc;
    }
    #controls {
      margin-top: 10px;
      display: flex;
      gap: 10px;
    }
    #mood-bar-container {
      width: 300px;
      background: #333;
      border-radius: 12px;
      margin: 20px auto;
    }
    #mood-bar {
      height: 20px;
      width: 0%;
      background: #ff4081;
      border-radius: 12px;
      transition: width 0.5s;
    }
  </style>
</head>
<body>
  <header>Mood Music Detector 🎵</header>
  <div id="video-container">
    <video id="video" autoplay playsinline></video>
  </div>
  <canvas id="canvas" width="320" height="240"></canvas>
  <div class="buttons">
    <button id="capture-btn">📸 Capture</button>
    <button id="clear-btn">🧹 Clear</button>
    <button id="detect-btn">🎯 Detect</button>
  </div>
  <div id="mood-result"></div>
  <iframe id="song-player" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  <div id="controls">
    <button onclick="previousSong()">⏮ Prev</button>
    <button onclick="togglePlayPause()">⏯ Play/Pause</button>
    <button onclick="nextSong()">⏭ Next</button>
  </div>
  <div id="mood-bar-container">
    <div id="mood-bar"></div>
  </div>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const moodResult = document.getElementById('mood-result');
    const songPlayer = document.getElementById('song-player');
    const moodBar = document.getElementById('mood-bar');

    let playlists = {
      happy: ['K1m7S6YqmfM', '8cdGOPzxPoM'],
      sad: ['YQUyeo8s_1A', 'ZqtZ0CHKGxY'],
      neutral: ['XgdY_s1LsZc', '63PTx_1WEq4']
    };
    let currentMood = '';
    let currentPlaylist = [];
    let currentIndex = 0;

    async function startVideo() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
      } catch (err) {
        alert("Webcam error: " + err.message);
      }
    }
    startVideo();

    document.getElementById('capture-btn').addEventListener('click', () => {
      ctx.save();
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      ctx.restore();
      canvas.style.display = 'block';
      moodResult.textContent = '';
      songPlayer.src = '';
      moodBar.style.width = '0%';
    });

    document.getElementById('clear-btn').addEventListener('click', () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      canvas.style.display = 'none';
      moodResult.textContent = '';
      songPlayer.src = '';
      moodBar.style.width = '0%';
    });

    document.getElementById('detect-btn').addEventListener('click', async () => {
      if (canvas.style.display === 'none') {
        alert("Please capture an image first!");
        return;
      }

      moodResult.textContent = "Detecting mood...";
      const imageData = canvas.toDataURL('image/jpeg');

      try {
        const response = await fetch('http://localhost:5000/detect_mood', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: imageData })
        });

        const data = await response.json();

        if (data.error) {
          moodResult.textContent = "Error: " + data.error;
          return;
        }

        currentMood = data.mood.toLowerCase();
        currentPlaylist = playlists[currentMood] || [];
        currentIndex = 0;
        playCurrentSong();

        speak(`Your mood is ${data.mood}`);

        moodResult.textContent = `Mood: ${data.mood}`;
        if (data.confidence) {
          moodBar.style.width = (data.confidence * 100).toFixed(0) + '%';
        }

        // change background
        document.body.style.background = currentMood === 'happy' ? '#ff9a9e' : currentMood === 'sad' ? '#4e54c8' : '#43cea2';

      } catch (err) {
        moodResult.textContent = "Mood detection failed.";
        console.error(err);
      }
    });

    function playCurrentSong() {
      if (currentPlaylist.length > 0) {
        songPlayer.src = `https://www.youtube.com/embed/${currentPlaylist[currentIndex]}?autoplay=1&enablejsapi=1`;
      }
    }

    function nextSong() {
      if (currentPlaylist.length > 0) {
        currentIndex = (currentIndex + 1) % currentPlaylist.length;
        playCurrentSong();
      }
    }

    function previousSong() {
      if (currentPlaylist.length > 0) {
        currentIndex = (currentIndex - 1 + currentPlaylist.length) % currentPlaylist.length;
        playCurrentSong();
      }
    }

    function togglePlayPause() {
      // Simple toggle: reload to pause/play (better to implement YouTube Player API)
      if (songPlayer.src.includes('autoplay=1')) {
        songPlayer.src = songPlayer.src.replace('autoplay=1', 'autoplay=0');
      } else {
        songPlayer.src = songPlayer.src.replace('autoplay=0', 'autoplay=1');
      }
    }

    function speak(text) {
      const synth = window.speechSynthesis;
      const utter = new SpeechSynthesisUtterance(text);
      synth.speak(utter);
    }
  </script>
</body>
</html>
